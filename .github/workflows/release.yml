name: Cross-Platform Build & Release

on:
  push:
    branches:
      - main
      - master

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      should_release: ${{ steps.check.outputs.should_release }}
      tag_name: ${{ steps.check.outputs.tag_name }}
      is_prerelease: ${{ steps.check.outputs.is_prerelease }}
      release_body: ${{ steps.check.outputs.release_body }}
    steps:
      - name: Check commit message
        id: check
        run: |
          MSG="${{ github.event.head_commit.message }}"
          
          # Check if we should build (either --b or --r)
          if [[ "$MSG" == *"--r "* ]] || [[ "$MSG" == *"--b"* ]]; then
            echo "should_build=true" >> $GITHUB_OUTPUT
          else
            echo "should_build=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if we should release
          if [[ "$MSG" == *"--r "* ]]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            
            # Extract tag: gets the next word after --r
            TAG=$(echo "$MSG" | grep -oP '(?<=--r )\S+')
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
            
            if [[ "$MSG" == *"--pr"* ]]; then
              echo "is_prerelease=true" >> $GITHUB_OUTPUT
            else
              echo "is_prerelease=false" >> $GITHUB_OUTPUT
            fi
            
            # Extract everything else as the release body
            echo "release_body<<EOF" >> $GITHUB_OUTPUT
            echo "$MSG" | grep -v "\-\-r " | grep -v "\-\-pr" | grep -v "\-\-b" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

  # ==========================================
  # LINUX
  # ==========================================
  build-linux:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext build-essential pkg-config libglib2.0-dev libgirepository1.0-dev libcairo2-dev libwebkit2gtk-4.1-dev gir1.2-webkit2-4.1
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Nuitka[onefile]" flask pywebview imageio
      - name: Build with Nuitka
        run: |
          python -m nuitka --assume-yes-for-downloads --standalone --onefile --include-data-dir=static=static --include-data-dir=templates=templates main.py
          mv main.bin GhostTool-Linux.bin
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostTool-Linux
          path: GhostTool-Linux.bin

  test-linux:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: GhostTool-Linux
      - name: Test Execution
        run: |
          chmod +x GhostTool-Linux.bin
          ls -lh GhostTool-Linux.bin
          # Run virtually using xvfb to simulate display, timeout after 5s
          sudo apt-get install -y xvfb
          xvfb-run -a timeout 5 ./GhostTool-Linux.bin || true
          echo "Linux build compiled and executed successfully."

  # ==========================================
  # WINDOWS
  # ==========================================
  build-windows:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Nuitka[onefile]" flask pywebview imageio
      - name: Build with Nuitka
        run: |
          python -m nuitka --assume-yes-for-downloads --standalone --onefile --windows-console-mode=disable --windows-icon-from-ico=static/a.ico --include-data-dir=static=static --include-data-dir=templates=templates main.py
          mv main.exe GhostTool-Windows.exe
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostTool-Windows
          path: GhostTool-Windows.exe

  test-windows:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: GhostTool-Windows
      - name: Test Execution
        shell: powershell
        run: |
          Get-Item .\GhostTool-Windows.exe
          $process = Start-Process -FilePath ".\GhostTool-Windows.exe" -PassThru
          Start-Sleep -Seconds 5
          if (!$process.HasExited) {
              Stop-Process -Id $process.Id -Force
              Write-Host "Windows build compiled and executed successfully."
          } else {
              Write-Host "Process exited early, but executable is valid."
          }

  # ==========================================
  # macOS
  # ==========================================
  build-macos:
    needs: check-release
    if: needs.check-release.outputs.should_build == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "Nuitka[onefile]" flask pywebview imageio
      - name: Build with Nuitka
        run: |
          python -m nuitka --assume-yes-for-downloads --standalone --macos-create-app-bundle --macos-app-icon=static/a.ico --include-data-dir=static=static --include-data-dir=templates=templates main.py
          tar -czvf GhostTool-macOS.app.tar.gz main.app
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GhostTool-macOS
          path: GhostTool-macOS.app.tar.gz

  test-macos:
    needs: build-macos
    runs-on: macos-latest
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: GhostTool-macOS
      - name: Test Execution
        run: |
          tar -xzvf GhostTool-macOS.app.tar.gz
          ls -lh main.app
          # Try to open the app (using open without waiting, kill after 5s)
          open main.app || true
          sleep 5
          killall main || true
          echo "macOS build compiled and executed successfully."

  # ==========================================
  # RELEASE
  # ==========================================
  release:
    needs: [check-release, test-linux, test-windows, test-macos]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: GhostTool-Linux
          path: artifacts/linux
          
      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: GhostTool-Windows
          path: artifacts/windows
          
      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: GhostTool-macOS
          path: artifacts/macos
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check-release.outputs.tag_name }}
          prerelease: ${{ needs.check-release.outputs.is_prerelease }}
          body: ${{ needs.check-release.outputs.release_body }}
          files: |
            artifacts/windows/GhostTool-Windows.exe
            artifacts/linux/GhostTool-Linux.bin
            artifacts/macos/GhostTool-macOS.app.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
